name: "Build all boards"

on:
  workflow_dispatch:
    inputs:
      boards:
        description: 'Board(s) to build'
        type: choice
        required: true
        default: 'all'
        options:
          - 'all'
          - 'rockchip-rk3528-fastyumjin'
          - 'rockchip-rk3566-wxy-oec-turbo-4g'
      kernel_branch:
        description: 'Kernel branch'
        type: choice
        required: true
        default: 'current'
        options:
          - 'current'
          - 'vendor'
          - 'edge'
      release:
        description: 'Debian/Ubuntu release'
        type: choice
        required: true
        default: 'bookworm'
        options:
          - 'bookworm'
          - 'jammy'
          - 'noble'
      build_desktop:
        description: 'Build with desktop'
        type: choice
        required: true
        default: 'no'
        options:
          - 'no'
          - 'yes'
      build_minimal:
        description: 'Build minimal'
        type: choice
        required: true
        default: 'no'
        options:
          - 'no'
          - 'yes'

jobs:
  build:
    name: ${{ matrix.board }}-${{ inputs.kernel_branch }}-${{ inputs.release }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(inputs.boards == 'all' && '["rockchip-rk3528-fastyumjin","rockchip-rk3566-wxy-oec-turbo-4g"]' || format('["{0}"]', inputs.boards)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libncurses-dev libssl-dev \
            libelf-dev python3 u-boot-tools device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            pv zip unzip xz-utils

      - name: Build
        env:
          BOARD: ${{ matrix.board }}
          BRANCH: ${{ inputs.kernel_branch }}
          RELEASE: ${{ inputs.release }}
          BUILD_DESKTOP: ${{ inputs.build_desktop }}
          BUILD_MINIMAL: ${{ inputs.build_minimal }}
        run: |
          if [[ "$BOARD" == "rockchip-rk3528-fastyumjin" && "$BRANCH" == "vendor" ]]; then
            ./compile.sh \
              BOARD="${BOARD}" \
              BRANCH="${BRANCH}" \
              KERNEL_MAJOR_MINOR=6.1 \
              KERNELPATCHDIR="" \
              RELEASE="${RELEASE}" \
              BUILD_MINIMAL="${BUILD_MINIMAL}" \
              BUILD_DESKTOP="${BUILD_DESKTOP}" \
              KERNEL_CONFIGURE=no \
              USERSETTINGS_LIST="" \
              EXTENSION="" \
              USE_DOCKER=no \
              PREFER_DOCKER=no
          else
            ./compile.sh \
              BOARD="${BOARD}" \
              BRANCH="${BRANCH}" \
              RELEASE="${RELEASE}" \
              BUILD_MINIMAL="${BUILD_MINIMAL}" \
              BUILD_DESKTOP="${BUILD_DESKTOP}" \
              KERNEL_CONFIGURE=no \
              USERSETTINGS_LIST="" \
              EXTENSION="" \
              USE_DOCKER=no \
              PREFER_DOCKER=no
          fi

      - name: Generate checksum
        run: |
          cd output/images
          for img in *.img; do
            [[ -f "$img" ]] && sha256sum "$img" > "${img}.sha256"
          done
          ls -la *.img* 2>/dev/null

      - name: Compress image
        run: |
          cd output/images
          for img in *.img; do
            if [[ -f "$img" ]]; then
              cp "$img" /tmp/"$img"
              xz -T0 -9 /tmp/"$img" && mv /tmp/"$img".xz "$img".xz
            fi
          done
          ls -la *.img.xz* 2>/dev/null

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          tag_name: build-${{ matrix.board }}-${{ inputs.kernel_branch }}-${{ github.run_number }}
          name: Armbian ${{ matrix.board }} (${{ inputs.kernel_branch }}, ${{ inputs.release }})
          draft: true
          files: |
            output/images/*.img.xz
            output/images/*.img.xz.sha256
            output/images/*.img.sha256
            output/images/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
