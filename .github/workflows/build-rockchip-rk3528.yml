name: "Build rockchip-rk3528-fastyumjin"

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch'
        type: choice
        required: true
        default: 'edge'
        options:
          - 'edge'
          - 'current'
          - 'legacy'
      release:
        description: 'Debian release'
        type: choice
        required: true
        default: 'bookworm'
        options:
          - 'bookworm'
          - 'jammy'
          - 'mantic'
          - 'trixie'
          - 'sid'

jobs:
  build:
    name: Build Armbian for rockchip-rk3528-fastyumjin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install essential build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libncurses-dev libssl-dev \
            libelf-dev python3 u-boot-tools device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            pv zip unzip xz-utils

      - name: Build
        env:
          BOARD: rockchip-rk3528-fastyumjin
          BRANCH: ${{ inputs.kernel_branch }}
          RELEASE: ${{ inputs.release }}
          USE_DOCKER: no
          PREFER_DOCKER: no
        run: |
          ./compile.sh \
            BOARD="${BOARD}" \
            BRANCH="${BRANCH}" \
            RELEASE="${RELEASE}" \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            USERSETTINGS_LIST="" \
            EXTENSION="" \
            ACCESS_TOKEN=skip \
            USE_DOCKER=no \
            PREFER_DOCKER=no

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: armbian-${{ inputs.kernel_branch }}-${{ inputs.release }}-rockchip-rk3528-fastyumjin
          path: output/
          retention-days: 7
