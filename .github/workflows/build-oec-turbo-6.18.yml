name: "Build rk3566-wxy-oec-turbo-4g 6.18"

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Debian release'
        type: choice
        required: true
        default: 'bookworm'
        options:
          - 'bookworm'
          - 'jammy'
          - 'noble'
      image_variant:
        description: 'Image variant'
        type: choice
        required: true
        default: 'both'
        options:
          - 'both'
          - 'server'
          - 'desktop'
      desktop_environment:
        description: 'Desktop environment'
        type: choice
        required: true
        default: 'xfce'
        options:
          - 'xfce'
          - 'mate'
          - 'cinnamon'
          - 'gnome'
          - 'kde-plasma'

jobs:
  build_server:
    if: ${{ inputs.image_variant == 'both' || inputs.image_variant == 'server' }}
    name: Build server image - rockchip-rk3566-wxy-oec-turbo-4g 6.18
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Armbian build
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Checkout userpatches
        uses: actions/checkout@v4
        with:
          path: armbian-build/userpatches

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libncurses-dev libssl-dev \
            libelf-dev python3 u-boot-tools device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            pv zip unzip xz-utils qemu-user-static debootstrap

      - name: Build server image
        working-directory: armbian-build
        env:
          BOARD: rockchip-rk3566-wxy-oec-turbo-4g
          RELEASE: ${{ inputs.release }}
        run: |
          ./compile.sh build \
            BOARD="${BOARD}" \
            BRANCH=current \
            KERNEL_MAJOR_MINOR=6.18 \
            RELEASE="${RELEASE}" \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            USERSETTINGS_LIST="" \
            EXTENSION="" \
            USE_DOCKER=no \
            PREFER_DOCKER=no

      - name: Generate checksum
        working-directory: armbian-build/output/images
        run: |
          for img in *.img; do
            [[ -f "$img" ]] && sha256sum "$img" > "${img}.sha256"
          done
          ls -la *.img* 2>/dev/null

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rockchip-rk3566-wxy-oec-turbo-4g-6.18-server-${{ inputs.release }}
          path: |
            armbian-build/output/images/*.img
            armbian-build/output/images/*.img.sha256
            armbian-build/output/images/*.txt

  build_desktop:
    if: ${{ inputs.image_variant == 'both' || inputs.image_variant == 'desktop' }}
    name: Build desktop image - rockchip-rk3566-wxy-oec-turbo-4g 6.18
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Armbian build
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Checkout userpatches
        uses: actions/checkout@v4
        with:
          path: armbian-build/userpatches

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libncurses-dev libssl-dev \
            libelf-dev python3 u-boot-tools device-tree-compiler \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            pv zip unzip xz-utils qemu-user-static debootstrap

      - name: Build desktop image
        working-directory: armbian-build
        env:
          BOARD: rockchip-rk3566-wxy-oec-turbo-4g
          RELEASE: ${{ inputs.release }}
          DESKTOP_ENVIRONMENT: ${{ inputs.desktop_environment }}
        run: |
          ./compile.sh build \
            BOARD="${BOARD}" \
            BRANCH=current \
            KERNEL_MAJOR_MINOR=6.18 \
            RELEASE="${RELEASE}" \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT="${DESKTOP_ENVIRONMENT}" \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            DESKTOP_APPGROUPS_SELECTED="browsers internet multimedia office desktop_tools" \
            KERNEL_CONFIGURE=no \
            USERSETTINGS_LIST="" \
            EXTENSION="" \
            USE_DOCKER=no \
            PREFER_DOCKER=no

      - name: Generate checksum
        working-directory: armbian-build/output/images
        run: |
          for img in *.img; do
            [[ -f "$img" ]] && sha256sum "$img" > "${img}.sha256"
          done
          ls -la *.img* 2>/dev/null

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rockchip-rk3566-wxy-oec-turbo-4g-6.18-desktop-${{ inputs.release }}-${{ inputs.desktop_environment }}
          path: |
            armbian-build/output/images/*.img
            armbian-build/output/images/*.img.sha256
            armbian-build/output/images/*.txt
